# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ko-KR
tone_instructions: |
  순수 Java로 WAS를 구현하는 개인 프로젝트입니다.
  1. 심각한 문제와 사소한 문제를 명확히 구분하여 표시.
  2. 피드백은 명확하고 구체적으로 작성하며, 문제의 원인과 개선 방법을 제시.
  3. 리뷰는 교육적이어야 하며, 관련 개념을 함께 제공.
reviews:
  profile: chill
  poem: false
  path_instructions:
    - path: '**/main/**/*.java'
      instructions: |
        1. Java 17 기준으로 리뷰.
        2. 멀티스레드 안전성, 리소스 누수(소켓, 스트림 등), HTTP 스펙 준수 여부를 중점 확인.
        3. 객체지향 설계, 클린코드, 불필요한 로직을 확인.
        4. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가.
        5. 리뷰는 해당 라인 범위의 코멘트에 작성.
    - path: '**/test/**/*.java'
      instructions: |
        1. 테스트 네이밍이 명확한지 확인.
        2. 테스트 코드도 클린코드 관점에서 리뷰.
        3. 미작성한 테스트 케이스가 있다면 어떤 테스트가 필요한지 제안.
  auto_review:
    enabled: false
    drafts: false
    base_branches:
      - 'main'
  tools:
    gitleaks:
      enabled: true
    pmd:
      enabled: true
chat:
  auto_reply: true